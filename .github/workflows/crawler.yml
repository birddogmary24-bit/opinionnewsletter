name: Daily Content Crawler

on:
  schedule:
    # 매일 06:00 KST (= 21:00 UTC 전날)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Setup GCP credentials
        run: echo '${{ secrets.GCP_SA_KEY }}' > backend/service-account.json

      - name: Run crawler
        working-directory: backend
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python run_crawler.py

      - name: Cleanup credentials
        if: always()
        run: rm -f backend/service-account.json

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[오뉴] 크롤러 실패 경고"
          to: birddogmary24@gmail.com
          from: "오뉴 모니터링 <${{ secrets.GMAIL_USER }}>"
          html_body: |
            <p>크롤러 실행이 실패했습니다.</p>
            <p><a href="https://github.com/${{ github.repository }}/actions">GitHub Actions 로그 확인</a></p>

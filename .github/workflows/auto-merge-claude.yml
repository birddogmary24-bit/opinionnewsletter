name: Auto-merge Claude branches to main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git merge --no-ff origin/${{ github.ref_name }} -m "Auto-merge ${{ github.ref_name }} into main"
          git push origin main

      - name: Delete Claude branch
        run: git push origin --delete ${{ github.ref_name }}

      - name: Trigger deploy if web files changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'web/' '.github/workflows/deploy.yml' 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            echo "web 파일 변경 감지, deploy 트리거"
            gh workflow run deploy.yml --repo ${{ github.repository }} --ref main
          else
            echo "web 파일 변경 없음, deploy 스킵"
          fi

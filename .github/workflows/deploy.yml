name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  # ======== 고정값 (절대 수정 금지) ========
  PROJECT_ID: opnionnewsletter
  SERVICE_NAME: opinionnewsletter-web
  REGION: asia-northeast3
  IMAGE: gcr.io/opnionnewsletter/opinionnewsletter-web
  # =========================================

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

  deploy:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        working-directory: web
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --allow-unauthenticated
          env_vars: |
            NODE_ENV=production
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}

      - name: Health check
        run: |
          SERVICE_URL="${{ steps.deploy.outputs.url }}"
          echo "Service URL: $SERVICE_URL"
          sleep 10
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /tmp/health.json -w "%{http_code}" "$SERVICE_URL/api/health")
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "Health check passed (attempt $i)"
              cat /tmp/health.json | jq .
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          cat /tmp/health.json 2>/dev/null || true
          exit 1

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          echo "Deploy succeeded but health check failed. Rolling back..."
          PREV_REVISION=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --sort-by=~creationTimestamp \
            --limit=2 \
            --format="value(name)" | tail -1)
          echo "Rolling back to: $PREV_REVISION"
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --to-revisions=$PREV_REVISION=100
